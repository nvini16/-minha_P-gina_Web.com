<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING -->
  <div id="loading">
  <div class="loader"></div>
  </div>
  

  <!-- alert -->
<div id="toast-container"></div>

<header>
  <div class="header-top">
    <img src="20260428_073431_0000.png" alt="Foto de perfil" class="logo">
    <h1>Nathanael</h1>

    <nav>
      <a href="#instagram">Instagram</a>
      <a href="#tiktok">TikTok</a>
      <a href="#contato">Contato</a>
    </nav>
  </div>

  <p class="alert-trigger" data-msg="Por que você clicou numa frase?" id="frase"></p>
</header>



<main>

  <!--insta fiote-->
  <section id="instagram" class="box">
    <h2>Instagram</h2>

    <div class="stories">
  <div class="story" data-video="aa92288247d879ffbbd83a66d3603e4b.mp4">
    <img src="Screenshot_20260429-113055.png" alt="minha foto">
  </div>

  <div class="story" data-video="lv_0_20260429122552.mp4">
    <img src="IMG_20260429_120844_011~2.jpg"vc alt="Minha foto">
  </div>

  <div class="story" data-video="lv_0_20260429133307.mp4">
    <img src="thumb3.jpg" alt="">
  </div>
    </div>
    
<!-- magia negra pra fazer o vídeo aparecer aqui-->
<div id="story-viewer">
  <video id="story-video" controls></video>
  <span id="fechar">&times;</span>
</div>

    <p class="bio">🎲 "O deserto te ensina mais sobre a água do que o oceano jamais poderia". 🎲</p>

    <a href="https://instagram.com" class="btn alert-trigger" data-msg="Indo pro Insta pae!">
  Segue o líder!
    </a>
  </section>

  <!-- TIKTOK -->
  <section id="tiktok" class="box">
    <h2>TikTok</h2>

    <div class="video-destaque">Vídeo destaque</div>

    <div class="carrossel">
      <div class="post">Post 1</div>
      <div class="post">Post 2</div>
      <div class="post">Post 3</div>
    </div>

    <a href="https://www.tiktok.com/@nathanaelvinicius2?_r=1&_t=ZS-95v5WcvqOOe" class="btn alert-trigger" data-msg="Indo pro TikTok fiote!">
  Segue o líder!
    </a>

</main>

<!-- ÁUDIO (pode ser bloqueado pelo navegador sem interação) -->
<audio id="bg-audio" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>
