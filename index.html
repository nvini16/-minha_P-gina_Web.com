<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathanael</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING -->
  <div id="loading">
  <div class="loader"></div>
  </div>
  

  <!-- alert -->
<div id="toast-container"></div>

<header>
  <div class="header-top">
    <img src="https://kommodo.ai/i/Hj3lygMj11thpaeEPXUN" alt="Foto de perfil" class="logo">
    <h1>Nathanael</h1>

    <nav>
      <a href="#instagram">Instagram</a>
      <a href="#tiktok">TikTok</a>
      <a href="#contato">Contato</a>
    </nav>
  </div>

  <p class="alert-trigger" data-msg="Por que você clicou numa frase?" id="frase"></p>
</header>



<main>

  <!-- INSTAGRAM -->
  <section id="instagram" class="box">
    <h2>Instagram</h2>

    <div class="destaques">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>

    <p class="bio">🎲 "O deserto te ensina mais sobre a água do que o oceano jamais poderia". 🎲</p>

    <a href="https://instagram.com" class="btn alert-trigger" data-msg="Indo pro Insta pae!">
  Seguir
    </a>
  </section>

  <!-- TIKTOK -->
  <section id="tiktok" class="box">
    <h2>TikTok</h2>

    <div class="video-destaque">Vídeo destaque</div>

    <div class="carrossel">
      <div class="post">Post 1</div>
      <div class="post">Post 2</div>
      <div class="post">Post 3</div>
    </div>

    <a href="https://instagram.com" class="btn alert-trigger" data-msg="Indo pro TikTok fiote!">
  Seguir
    </a>

</main>

<!-- ÁUDIO (pode ser bloqueado pelo navegador sem interação) -->
<audio id="bg-audio" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

 <!--<a href="https://instagram.com" class="btn alert-trigger" data-msg="Indo pro Insta pae!">
  Seguir
</a>-->

<script src="script.js"></script>

</body>
</html>
