<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathanael</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
</div>

<header>
  <div class="header-top">
    <img src="sua-foto.jpg" class="logo">
    <h1>Nathanael</h1>

    <nav>
      <a href="#instagram">Instagram</a>
      <a href="#tiktok">TikTok</a>
      <a href="#contato">Contato</a>
    </nav>
  </div>

  <p id="frase"></p>
</header>

<!-- ALERTS -->
<div class="alert" id="alerta">Página em desenvolvimento guys!</div>

<main>

<!-- INSTAGRAM -->
<section id="instagram" class="box">
  <h2>Instagram</h2>

  <div class="destaques">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <p class="bio">🎲"O deserto te ensina mais sobre a água do que o ocenao jamais poderia".🎲</p>

  <button>Seguir</button>
</section>

<!-- TIKTOK -->
<section id="tiktok" class="box">
  <h2>TikTok</h2>

  <div class="video-destaque">Vídeo destaque</div>

  <div class="carrossel">
    <div class="post">Post 1</div>
    <div class="post">Post 2</div>
    <div class="post">Post 3</div>
  </div>

  <button>Seguir</button>
</section>

</main>

<!-- AUDIO -->
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
